<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Poem</title>

<style>
body {
    background-color: #ffffff;
    color: #222222;
    font-family: Georgia, 'Times New Roman', Times, serif;
    text-align: center;
    padding: 40px;
    transition: background-color 0.5s ease, color 0.5s ease;
}

h1 {
    font-size: 16px;
    font-weight: normal;
    letter-spacing: 1px;
}

button {
   padding: 10px 20px;
    font-size: 15px;
    cursor: pointer;
    background-color: #c799b0;
    border: none;
    border-radius: 8px;
    font-family: Georgia, serif;
    transition: transform 0.2s;
}

button:hover {
    background-color: #5a5f7a;
}

button:active {
    transform: scale(0.9);
}

#poem {
    margin-top: 30px;
    font-size: 16.5px;
    line-height: 1.8;
    white-space: pre-line; 
}

.fade {
    opacity: 0;
    animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
    }
}

</style>
</head>

<body>

<h1>click to reveal the poem.</h1>
<button onclick="revealLine()">reveal</button>

<div id="poem"></div>

<script>
const lines = [
    "could it be enough to just float in your orbit?",
    "can we watch our phantoms like watching wild horses?",
    "cooler in theory but not if you force it to be",
    "it just didn't happen",

    "did some bird flap its wings over in Asia?",
    "did some force take you because i didn't pray?",
    "every single thing to come has turned into ashes.",
    "'cause it's all over now. it's not meant to be.",
    "so i'll say words i don't believe:",

    "goodbye, goodbye, goodbye,",
    "you were bigger than the whole sky.",
    "you were more than just a short time.",
    "and i've got a lot to pine about,",
    "i've got a lot to live without.",

    "i'm never going to meet",
    "what could've been,",
    "would've been,",
    "what should've been you.",

    "♡",
    "(taylor swift, bigger than the whole sky, 2022)."
];


let currentLine = 0;

                        //----------variable to keep track of line in poem, starts at 0
function revealLine() {
                        //----------finds the HTML element with id of poem, where lines are added 
    const poemDiv = document.getElementById('poem');
    const body = document.body;

    if (currentLine < lines.length) {
                        //----------checks if lines are still left to show. lines is array w all lines
        const span = document.createElement("span");
        span.className = "fade";
        span.innerHTML = lines[currentLine] + "<br>";
                        //----------adds the class fade in the text span
        poemDiv.appendChild(span);
                        //----------adds new line to poem div

        let progress = currentLine / lines.length;

                        //----------background goes from white to black
        let shade = Math.floor(255 * (1 - progress));
        body.style.backgroundColor = `rgb(${shade}, ${shade}, ${shade})`;

                        //----------text goes from black to white
        let textShade = Math.floor(40 + (215 * progress)); 
        body.style.color = `rgb(${textShade}, ${textShade}, ${textShade})`;

        currentLine++;  //----------moves to next line next click
    } else {
        body.style.backgroundColor = "#000";
        body.style.color = "#fff";
        document.querySelector("button").innerText = "gone."; 
                         //----------button changes from reveal to gone
    }
}
</script> 

</body>
</html>
